# Nginx configuration for Bentabet POS
# Place in /etc/nginx/sites-available/bentabet
# Then: ln -s /etc/nginx/sites-available/bentabet /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

upstream bentabet_api {
    # PM2 cluster mode — match instances in ecosystem.config.js
    server 127.0.0.1:5000;
    # Add more if running multiple ports
    # server 127.0.0.1:5001;
    # server 127.0.0.1:5002;
    keepalive 64;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — generated by Certbot
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend (production build)
    root /opt/bentabet/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # API proxy
    location /api/ {
        proxy_pass http://bentabet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Rate limiting for API
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
    }

    # Uploaded files (photos, receipts, documents)
    location /uploads/ {
        alias /opt/bentabet/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Socket.io (WebSocket support)
    location /socket.io/ {
        proxy_pass http://bentabet_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Static files (with caching)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~ /\.env {
        deny all;
    }
    location ~ /node_modules/ {
        deny all;
    }
}

# Rate limit zone definition (for above)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
