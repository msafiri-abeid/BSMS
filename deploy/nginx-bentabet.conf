# Nginx configuration for Bentabet BSMS
# Two server blocks: frontend (bsms.betbenta.com) + API (api.betbenta.com)
#
# Setup:
#   cp deploy/nginx-bentabet.conf /etc/nginx/sites-available/bsms
#   ln -sf /etc/nginx/sites-available/bsms /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d bsms.betbenta.com -d api.betbenta.com

upstream bentabet_api {
    server 127.0.0.1:5000;
    keepalive 64;
}

# ─── Rate limit zones ──────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ─── Frontend: bsms.betbenta.com ───────────────────────────────
server {
    listen 80;
    server_name bsms.betbenta.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bsms.betbenta.com;

    ssl_certificate /etc/letsencrypt/live/bsms.betbenta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bsms.betbenta.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /opt/bsms/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # Uploaded files — frontend uses relative /uploads/ URLs in <img> and <a> tags
    location /uploads/ {
        alias /opt/bsms/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Static assets (Vite build output)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny sensitive files
    location ~ /\. { deny all; }
    location ~ /\.env { deny all; }
    location ~ /node_modules/ { deny all; }
}

# ─── API: api.betbenta.com ─────────────────────────────────────
server {
    listen 80;
    server_name api.betbenta.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.betbenta.com;

    ssl_certificate /etc/letsencrypt/live/api.betbenta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.betbenta.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow uploads up to 10MB (meter images, receipts)
    client_max_body_size 10m;

    # API proxy
    location /api/ {
        proxy_pass http://bentabet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
    }

    # Socket.io (WebSocket support)
    location /socket.io/ {
        proxy_pass http://bentabet_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Uploaded files — API also serves uploads for direct access
    location /uploads/ {
        alias /opt/bsms/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Health check
    location /health {
        proxy_pass http://bentabet_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Deny everything else on API domain (no SPA needed)
    location / {
        return 404 '{"success":false,"message":"Not found"}';
        add_header Content-Type application/json always;
    }

    # Deny sensitive files
    location ~ /\. { deny all; }
    location ~ /\.env { deny all; }
    location ~ /node_modules/ { deny all; }
}
